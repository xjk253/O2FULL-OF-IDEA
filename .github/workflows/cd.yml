name: CD — Build APK

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phone
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            phone/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('phone/**/*.gradle.kts', 'phone/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Calculate version
        id: version
        run: |
          VERSION=$(cat ../version.txt)
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION"

          if [ "${{ github.ref_name }}" = "main" ]; then
            MAJ=$((MAJ + 1))
            MIN=0
            PAT=0
          else
            PAT=$((PAT + 1))
            if [ $PAT -gt 9 ]; then
              PAT=0
              MIN=$((MIN + 1))
            fi
            if [ $MIN -gt 9 ]; then
              MIN=0
              MAJ=$((MAJ + 1))
            fi
          fi

          NEW_VERSION="${MAJ}.${MIN}.${PAT}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Version: $NEW_VERSION (branch: ${{ github.ref_name }})"

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.new_version }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $(echo ${{ steps.version.outputs.new_version }} | tr -d '.')/" app/build.gradle.kts

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          files: phone/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true

      - name: Save version
        run: echo "${{ steps.version.outputs.new_version }}" > ../version.txt

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../version.txt app/build.gradle.kts
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push
