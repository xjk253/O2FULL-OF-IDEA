name: CI — Agent Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  agent-tests:
    name: Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
      - run: npm test
